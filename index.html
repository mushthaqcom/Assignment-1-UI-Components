<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Mushthaq.com - Web Developer</title>
  <link rel="stylesheet" href="style.css">
</head>
<body>

  <!-- Navigation Bar -->
  <nav class="navbar">
    <div class="logo">Mushthaq.com</div>
    <ul class="nav-links">
      <li><a href="#">Home</a></li>
      <li><a href="#">Projects</a></li>
      <li><a href="#">About</a></li>
      <li><a href="#">Contact</a></li>
    </ul>
  </nav>

  <!-- Feature Card -->
  <section class="card-section">
    <article class="card">
      <div class="card-image">
        <img src="./project-image.png" alt="Project Image">
        <span class="badge">Web Design</span>
      </div>
      <div class="card-content">
        <h2>Building a website for an agency.</h2>
        <p>I built a website for an agency using WordPress.</p>
        <button>View Project</button>
      </div>
    </article>
  </section>

  <!-- Contact Form -->
  <section class="form-section">
    <form class="contact-form">
      <h2>Contact Us</h2>

      <label for="name">Name</label>
      <input type="text" id="name" name="name" required>

      <label for="email">Email</label>
      <input type="email" id="email" name="email" required>

      <label for="subject">Subject</label>
      <select id="subject" name="subject" required>
        <option value="">Select a subject</option>
        <option value="general">General Inquiry</option>
        <option value="project">Project Request</option>
        <option value="support">Support</option>
      </select>

      <label for="message">Message</label>
      <textarea id="message" name="message" rows="5" required></textarea>

      <button type="submit">Send Message</button>
    </form>
  </section>

</body>
</html>
